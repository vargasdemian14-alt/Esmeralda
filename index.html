Tenés una forma de ser que no es común,<br>
algo tranquilo pero a la vez fuerte,<br>
algo que no necesita llamar la atención<br>
porque se nota solo.<br><br>

Y sí… sos hermosa,<br>
pero no es solo eso.<br><br>

Es cómo hablás,<br>
cómo pensás,<br>
cómo hacés que una conversación cualquiera<br>
se sienta distinta.<br><br>

Hay algo en vos que se queda,<br>
que no pasa rápido,<br>
que no se olvida fácil.<br><br>

A veces me encuentro recordando cosas tuyas<br>
sin darme cuenta,<br>
detalles mínimos que con otra persona<br>
ni siquiera notaría.<br><br>

Y eso me hace dar cuenta de algo:<br>
no sos alguien más.<br><br>

Sos alguien que vale la pena conocer de verdad,<br>
alguien que no quiero que sea algo pasajero.<br><br>

No sé qué va a pasar con todo esto,<br>
ni hace falta saberlo ahora.<br><br>

Me gusta que sea así,<br>
real, tranquilo,<br>
sin apuros ni presiones.<br><br>

Pero sí sé algo…<br><br>

que me gusta hablar con vos,<br>
que me gusta cómo me hacés sentir,<br>
y que tengo muchas ganas<br>
de seguir descubriendo quién sos.<br><br>

Porque entre todo lo casual de la vida,<br>
apareciste vos…<br>
y eso, para mí,<br>
ya significa algo.<br><br>

Y si esto es el comienzo de algo lindo,<br>
entonces hay vivirlo bien y tranquilos sin estas angustiados ni nada de eso siempre charlando con el corazon y con sinceridad y amarte,<br>
paso a paso… y demostrar el gran amor que tengo por vos <br><br>

por algo el destino nos hizo chocarnos verdad? si es asi me gustaria chocar todas las veces posibles en otras vidas con vos 


para Esmeralda. <br><br>

— Demian
